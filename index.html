<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generalist Agent - AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #8892b0; font-size: 1rem; }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }
        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { text-align: right; }
        .message-content {
            display: inline-block;
            padding: 15px 20px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.6;
        }
        .message.bot .message-content {
            background: rgba(0,217,255,0.1);
            border: 1px solid rgba(0,217,255,0.3);
            border-bottom-left-radius: 5px;
        }
        .message.user .message-content {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-bottom-right-radius: 5px;
        }
        .message-agent {
            font-size: 0.75rem;
            color: #00ff88;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d9ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }
        .input-container {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-wrapper { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #00d9ff; }
        input[type="text"]::placeholder { color: #8892b0; }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            text-align: center;
            padding: 10px;
            font-size: 0.85rem;
            color: #8892b0;
        }
        .status.online { color: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Generalist Agent</h1>
            <p class="subtitle">AI Assistant powered by OpenHands</p>
        </header>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-agent">🤖 Generalist Agent</div>
                    <div class="message-content">
                        Halo! Saya Generalist Agent. Kirim pesan dan saya akan respond! 🚀
                    </div>
                </div>
            </div>
            
            <div class="status" id="status">
                <span class="status online">● Online</span> — Ready to assist
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'sk-oh-f0OS4LfxbtCZjnOqwo6BYC0oGzaos244';
        const API_BASE = 'https://app.all-hands.dev/api/v1';
        
        let isProcessing = false;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isProcessing) return;
            
            addMessage(message, 'user');
            input.value = '';
            showTyping();
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            
            try {
                const convId = await createConversation(message);
                if (convId) {
                    await pollForResponse(convId);
                } else {
                    hideTyping();
                    addMessage('Gagal membuat conversation', 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage(`Error: ${error.message}`, 'bot');
            }
            
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
        }

        async function createConversation(message) {
            const res = await fetch(`${API_BASE}/app-conversations`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    initial_message: {
                        content: [{ type: "text", text: message }]
                    }
                })
            });
            
            if (!res.ok) return null;
            const data = await res.json();
            
            if (data.app_conversation_id) {
                return data.app_conversation_id;
            } else if (data.id) {
                for (let i = 0; i < 30; i++) {
                    await sleep(2000);
                    const readyRes = await fetch(`${API_BASE}/app-conversations/start-tasks?ids=${data.id}`, {
                        headers: { 'Authorization': `Bearer ${API_KEY}` }
                    });
                    if (readyRes.ok) {
                        const tasks = await readyRes.json();
                        const task = tasks[0];
                        if (task?.status === 'READY' && task.app_conversation_id) {
                            return task.app_conversation_id;
                        }
                    }
                }
            }
            return null;
        }

        async function pollForResponse(convId) {
            let lastIndex = 0;
            
            while (true) {
                try {
                    const res = await fetch(`${API_BASE}/conversation/${convId}/events/search?limit=50`, {
                        headers: { 'Authorization': `Bearer ${API_KEY}`, 'Accept': 'application/json' }
                    });
                    
                    if (!res.ok) {
                        await sleep(2000);
                        continue;
                    }
                    
                    const data = await res.json();
                    const events = data.items || [];
                    
                    // Process new events only
                    for (let i = lastIndex; i < events.length; i++) {
                        const event = events[i];
                        
                        // Get assistant messages (source can be 'agent' or 'assistant')
                        if (event.kind === 'MessageEvent' && (event.source === 'assistant' || event.source === 'agent')) {
                            const content = event.llm_message?.content;
                            if (content) {
                                const text = extractText(content);
                                if (text?.trim()) {
                                    hideTyping();
                                    addMessage(text, 'bot');
                                }
                            }
                        }
                        
                        // Get observation content
                        if (event.kind === 'ObservationEvent') {
                            const obs = event.observation;
                            let content = obs?.content ? extractText(obs.content) : '';
                            if (!content && obs?.output) content = extractText(obs.output);
                            if (content?.trim()) {
                                hideTyping();
                                addMessage(content, 'bot');
                            }
                        }
                        
                        // Check finish
                        if (event.kind === 'ConversationStateUpdateEvent' && 
                            event.key === 'execution_status' && event.value === 'finished') {
                            return; // Done
                        }
                    }
                    
                    lastIndex = events.length;
                    
                } catch (e) {
                    console.log('Poll error:', e);
                }
                
                await sleep(2500);
            }
        }

        function extractText(content) {
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) {
                return content.map(c => c.text || '').join('\n').trim();
            }
            return '';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function addMessage(content, type) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = type === 'bot' 
                ? `<div class="message-agent">🤖 Generalist Agent</div><div class="message-content">${escapeHtml(content)}</div>`
                : `<div class="message-content">${escapeHtml(content)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            hideTyping();
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'message bot';
            div.innerHTML = `<div class="message-agent">🤖 Generalist Agent</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
