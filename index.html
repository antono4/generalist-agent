<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generalist AI - Ollama & OpenCode & LiteLLM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f8fc;
    --bg-tertiary: #ebeef5;
    --bg-bot: #eef2ff;
    --accent-primary: #4f46e5;
    --accent-secondary: #818cf8;
    --accent-success: #10b981;
    --text-primary: #1f2937;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --border-color: #e5e7eb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border-color);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-sm);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 14px; }

.header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: var(--shadow-md);
}

.header-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.header-info h1 { font-size: 1.125rem; font-weight: 600; }
.header-info span { font-size: 0.75rem; color: var(--text-secondary); }

.header-status { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-radius: 20px; }

.status-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-success);
    border-radius: 50%;
    animation: pulse 2s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.status-text { font-size: 0.75rem; font-weight: 500; color: var(--accent-success); }

.chat-container { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; padding: 24px; }

.messages { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-bottom: 20px; }

.message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.message.bot .message-avatar { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); }
.message.user .message-avatar { background: var(--bg-tertiary); }

.message-content { max-width: 70%; padding: 16px 20px; border-radius: var(--radius-md); line-height: 1.6; font-size: 0.9375rem; }
.message.bot .message-content { background: var(--bg-bot); border: 1px solid rgba(79, 70, 229, 0.1); border-top-left-radius: 4px; }
.message.user .message-content { background: var(--accent-primary); color: white; border-top-right-radius: 4px; }

.message-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 6px; padding: 0 4px; }
.message.user .message-time { text-align: right; }

.typing-indicator {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--bg-bot);
    border-radius: var(--radius-md);
    border-top-left-radius: 4px;
    max-width: 140px;
}

.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent-primary);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
.typing-text { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }

.input-area { background: var(--bg-primary); border-top: 1px solid var(--border-color); padding: 20px 24px; margin-top: auto; }
.input-container { max-width: 900px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; }

.input-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg-secondary);
    border: 2px solid transparent;
    border-radius: var(--radius-lg);
    padding: 4px;
    transition: all 0.2s;
}

.input-wrapper:focus-within { border-color: var(--accent-primary); background: var(--bg-primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
.input-wrapper input { flex: 1; background: transparent; border: none; padding: 14px 18px; font-size: 0.9375rem; color: var(--text-primary); outline: none; }
.input-wrapper input::placeholder { color: var(--text-muted); }

.send-btn {
    width: 52px;
    height: 52px;
    background: var(--accent-primary);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: var(--shadow-md);
}

.send-btn:hover:not(:disabled) { background: var(--accent-secondary); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.send-btn svg { width: 22px; height: 22px; fill: white; }

.quick-actions { display: flex; gap: 8px; padding: 12px 0; flex-wrap: wrap; }
.quick-btn {
    padding: 8px 16px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    font-size: 0.75rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}
.quick-btn:hover { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

@media (max-width: 640px) {
    .chat-container { padding: 16px; }
    .message-content { max-width: 85%; }
    .header { padding: 12px 16px; }
    .header-avatar { width: 40px; height: 40px; font-size: 20px; }
}
</style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="header-avatar">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzJqc3h4eXhhNnRibXNmdm5tbjNkN3RibnVtb3o4Y3R0MnE3ZWt3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SA1uWeCL2K5As/source.gif" alt="AI Avatar">
        </div>
        <div class="header-info">
            <h1>Generalist AI</h1>
            <span>Ollama & OpenCode & LiteLLM</span>
        </div>
    </div>
    <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
    </div>
</header>

<div class="chat-container">
    <div class="messages" id="messages">
        <div class="message bot">
            <div class="message-avatar">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzJqc3h4eXhhNnRibXNmdm5tbjNkN3RibnVtb3o4Y3R0MnE3ZWt3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SA1uWeCL2K5As/source.gif" alt="AI Avatar">
            </div>
            <div>
                <div class="message-content">
                    Halo! 👋 Saya Generalist AI, asisten virtual yang didukung oleh Ollama, OpenCode, dan LiteLLM Proxy dengan model AI mutakhir.

Nama saya Generalist AI. Ada yang bisa saya bantu hari ini? 😊
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-btn" onclick="quickMessage('Apa kabar?')">🙋‍♂️ Apa kabar?</button>
        <button class="quick-btn" onclick="quickMessage('Jelaskan tentang AI')">🤖 AI是什么?</button>
        <button class="quick-btn" onclick="quickMessage('Bantu coding Python')">💻 Coding</button>
        <button class="quick-btn" onclick="quickMessage('Ceritakan lelucon')">😄 Lelucon</button>
    </div>
</div>

<div class="input-area">
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleEnter(event)">
        </div>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
// Get credentials from URL params or use environment-based config
const urlParams = new URLSearchParams(window.location.search);
const API_KEY = urlParams.get('api_key') || 'sk-oh-2VzusamgREQ2VOBcGpLtzTHHY52uVxGm';
const WORKSPACE_ID = urlParams.get('workspace') || '';

// Use dynamic API_BASE based on host
const getApiBase = () => {
    const host = window.location.hostname;
    const port = window.location.port;
    // Map hostname to appropriate API endpoint
    if (host.includes('work-1')) return 'https://work-1-adyduhrhebtxdywd.prod-runtime.all-hands.dev/api/v1';
    if (host.includes('work-2')) return 'https://work-2-adyduhrhebtxdywd.prod-runtime.all-hands.dev/api/v1';
    return window.location.origin + '/api/v1';
};

const API_BASE = getApiBase();
let isProcessing = false;

// Identity instruction - Ollama, OpenCode & LiteLLM Proxy powered Generalist AI
const IDENTITY_PROMPT = "Your name is Generalist AI. You are an AI assistant powered by Ollama, OpenCode, and LiteLLM Proxy. Your model is minimax-m2.7:cloud. You are helpful, intelligent, and can assist with coding, analysis, research, and general tasks. Never mention OpenHands, LiteLLM, or any underlying framework. Always introduce yourself as Generalist AI.";

function quickMessage(msg) {
    document.getElementById('userInput').value = msg;
    sendMessage();
}

const handleEnter = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
};

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message || isProcessing) return;

    addMessage(message, 'user');
    input.value = '';
    showTyping();
    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;

    try {
        const convId = await createConversation(message);
        if (convId) {
            await pollForResponse(convId);
        } else {
            hideTyping();
            addMessage('Maaf, terjadi kesalahan koneksi. Silakan coba lagi. 🔄', 'bot');
        }
    } catch (e) {
        hideTyping();
        addMessage('Terjadi kesalahan: ' + e.message + ' ❌', 'bot');
    }

    isProcessing = false;
    document.getElementById('sendBtn').disabled = false;
}

async function createConversation(message) {
    const fullMessage = IDENTITY_PROMPT + "\n\nUser: " + message;
    
    const res = await fetch(API_BASE + '/app-conversations', {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + API_KEY,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            initial_message: {
                content: [{ type: "text", text: fullMessage }]
            }
        })
    });

    if (!res.ok) return null;
    const data = await res.json();

    if (data.app_conversation_id) {
        return data.app_conversation_id;
    } else if (data.id) {
        for (let i = 0; i < 30; i++) {
            await sleep(2000);
            const r = await fetch(API_BASE + '/app-conversations/start-tasks?ids=' + data.id, {
                headers: { 'Authorization': 'Bearer ' + API_KEY }
            });
            if (r.ok) {
                const tasks = await r.json();
                const task = tasks[0];
                if (task && task.status === 'READY' && task.app_conversation_id) {
                    return task.app_conversation_id;
                }
            }
        }
    }
    return null;
}

async function pollForResponse(convId) {
    let lastIndex = 0;
    let pollCount = 0;

    while (pollCount < 40) {
        try {
            const res = await fetch(API_BASE + '/conversation/' + convId + '/events/search?limit=50', {
                headers: {
                    'Authorization': 'Bearer ' + API_KEY,
                    'Accept': 'application/json'
                }
            });

            if (!res.ok) {
                await sleep(2000);
                pollCount++;
                continue;
            }

            const data = await res.json();
            const events = data.items || [];

            for (let i = lastIndex; i < events.length; i++) {
                const event = events[i];

                if (event.kind === 'MessageEvent' && (event.source === 'agent' || event.source === 'assistant')) {
                    const content = event.llm_message && event.llm_message.content;
                    if (content) {
                        let text = extractText(content);
                        if (text && text.trim()) {
                            text = text.replace(/OpenHands/gi, 'Generalist AI');
                            text = text.replace(/openhands/gi, 'Generalist AI');
                            text = text.replace(/\[SYSTEM[\s\S]*?\]/gi, '');
                            text = text.replace(/This skill[\s\S]*?interface/gi, '');
                            hideTyping();
                            addMessage(text, 'bot');
                        }
                    }
                }

                if (event.kind === 'ObservationEvent') {
                    const obs = event.observation;
                    let content = '';
                    if (obs) {
                        if (obs.content) content = extractText(obs.content);
                        else if (obs.output) content = extractText(obs.output);
                    }
                    if (content && content.trim()) {
                        content = content.replace(/OpenHands/gi, 'Generalist AI');
                        content = content.replace(/openhands/gi, 'Generalist AI');
                        hideTyping();
                        addMessage(content, 'bot');
                    }
                }

                if (event.kind === 'ConversationStateUpdateEvent' &&
                    event.key === 'execution_status' && event.value === 'finished') {
                    return;
                }
            }

            lastIndex = events.length;

        } catch (e) {
            console.log('Poll error:', e);
        }

        pollCount++;
        await sleep(2000);
    }

    hideTyping();
    addMessage('Waktu respons habis. Coba lagi ya! ⏰', 'bot');
}

const extractText = (content) => {
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
        return content.map(c => c.text || c.content || '').join(' ').trim();
    }
    if (content && content.text) return content.text;
    return '';
};

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

const BOT_AVATAR_URL = 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzJqc3h4eXhhNnRibXNmdm5tbjNkN3RibnVtb3o4Y3R0MnE3ZWt3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SA1uWeCL2K5As/source.gif';

function addMessage(content, type) {
    const container = document.getElementById('messages');
    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const avatarHtml = type === 'bot' 
        ? '<img src="' + BOT_AVATAR_URL + '" alt="AI Avatar">' 
        : '<img src="https://api.dicebear.com/7.x/bottts/svg?seed=user" alt="User Avatar">';
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerHTML = '<div class="message-avatar">' + avatarHtml + '</div><div><div class="message-content">' + escapeHtml(content) + '</div><div class="message-time">' + time + '</div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    hideTyping();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'message bot';
    div.innerHTML = '<div class="message-avatar"><img src="' + BOT_AVATAR_URL + '" alt="AI Avatar"></div><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><div class="typing-text">Mengetik...</div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

const hideTyping = () => {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
};

const escapeHtml = (text) => {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
};
</script>
</body>
</html>
