<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generalist Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0f;
            --bg-secondary: #161618;
            --bg-tertiary: #1c1c1f;
            --accent-cyan: #00d4ff;
            --accent-magenta: #ff00aa;
            --text-primary: #f0f0f0;
            --text-secondary: #8a8a8a;
            --border: rgba(255,255,255,0.06);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .logo-badge {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .logo-text h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .logo-text span {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .status-pulse {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        
        .message-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        
        .message-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid var(--border);
            border-radius: 16px 16px 4px 16px;
        }
        
        .message.bot .message-bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent-cyan);
            border-radius: 4px 16px 16px 16px;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            align-self: flex-start;
            max-width: 100px;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        
        .typing-text {
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Input */
        .input-section {
            padding: 20px 28px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        
        .input-box {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 6px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        
        .input-box:focus-within {
            border-color: var(--accent-cyan);
        }
        
        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
        }
        
        .input-box input::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent-cyan);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--bg-primary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-badge">🤖</div>
            <div class="logo-text">
                <h1>GENERALIST</h1>
                <span>AI Assistant</span>
            </div>
        </div>
        <div class="connection-status">
            <div class="status-pulse"></div>
            <span>Online</span>
        </div>
    </header>
    
    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            <div class="message-label">Agent</div>
            <div class="message-bubble">
                Halo! Saya Generalist Agent. Kirim pesan dan saya akan merespons dengan detail. 🚀
            </div>
        </div>
    </div>
    
    <div class="input-section">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = 'sk-oh-f0OS4LfxbtCZjnOqwo6BYC0oGzaos244';
        const API_BASE = 'https://app.all-hands.dev/api/v1';
        
        let isProcessing = false;

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isProcessing) return;

            addMessage(message, 'user');
            input.value = '';
            showTyping();
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const convId = await createConversation(message);
                if (convId) {
                    await pollForResponse(convId);
                } else {
                    hideTyping();
                    addMessage('Gagal membuat conversation', 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage(`Error: ${error.message}`, 'bot');
            }

            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
        }

        async function createConversation(message) {
            const res = await fetch(`${API_BASE}/app-conversations`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    initial_message: {
                        content: [{ type: "text", text: message }]
                    }
                })
            });

            if (!res.ok) return null;
            const data = await res.json();

            if (data.app_conversation_id) {
                return data.app_conversation_id;
            } else if (data.id) {
                for (let i = 0; i < 30; i++) {
                    await sleep(2000);
                    const readyRes = await fetch(`${API_BASE}/app-conversations/start-tasks?ids=${data.id}`, {
                        headers: { 'Authorization': `Bearer ${API_KEY}` }
                    });
                    if (readyRes.ok) {
                        const tasks = await readyRes.json();
                        const task = tasks[0];
                        if (task?.status === 'READY' && task.app_conversation_id) {
                            return task.app_conversation_id;
                        }
                    }
                }
            }
            return null;
        }

        async function pollForResponse(convId) {
            let lastIndex = 0;

            while (true) {
                try {
                    const res = await fetch(`${API_BASE}/conversation/${convId}/events/search?limit=50`, {
                        headers: { 'Authorization': `Bearer ${API_KEY}`, 'Accept': 'application/json' }
                    });

                    if (!res.ok) {
                        await sleep(2000);
                        continue;
                    }

                    const data = await res.json();
                    const events = data.items || [];

                    for (let i = lastIndex; i < events.length; i++) {
                        const event = events[i];

                        if (event.kind === 'MessageEvent' && (event.source === 'assistant' || event.source === 'agent')) {
                            const content = event.llm_message?.content;
                            if (content) {
                                const text = extractText(content);
                                if (text?.trim()) {
                                    // Simulate thinking delay
                                    await sleep(2000 + Math.random() * 1500);
                                    hideTyping();
                                    addMessage(text, 'bot');
                                }
                            }
                        }

                        if (event.kind === 'ObservationEvent') {
                            const obs = event.observation;
                            let content = obs?.content ? extractText(obs.content) : '';
                            if (!content && obs?.output) content = extractText(obs.output);
                            if (content?.trim()) {
                                await sleep(2000 + Math.random() * 1500);
                                hideTyping();
                                addMessage(content, 'bot');
                            }
                        }

                        if (event.kind === 'ConversationStateUpdateEvent' && 
                            event.key === 'execution_status' && event.value === 'finished') {
                            return;
                        }
                    }

                    lastIndex = events.length;

                } catch (e) {
                    console.log('Poll error:', e);
                }

                await sleep(2500);
            }
        }

        function extractText(content) {
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) {
                return content.map(c => c.text || '').join('\n').trim();
            }
            return '';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="message-label">${type === 'bot' ? 'Agent' : 'You'}</div>
                <div class="message-bubble">${escapeHtml(content)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            hideTyping();
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'typing-indicator';
            div.innerHTML = `
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="typing-text">thinking</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
