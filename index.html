<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generalist AI - Ollama & OpenCode & LiteLLM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-tertiary: #334155;
    --bg-bot: #1e293b;
    --accent-primary: #6366f1;
    --accent-secondary: #818cf8;
    --accent-success: #22c55e;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border-color: #334155;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header - Modern Glassmorphism */
.header {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 14px; }

.header-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    border: 2px solid var(--accent-primary);
}

.header-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.header-info h1 { font-size: 1.125rem; font-weight: 600; color: var(--text-primary); }
.header-info span { font-size: 0.75rem; color: var(--text-secondary); }

.header-status { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    padding: 8px 16px; 
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 20px; 
}

.status-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-success);
    border-radius: 50%;
    animation: pulse 2s infinite;
    box-shadow: 0 0 8px var(--accent-success);
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.status-text { font-size: 0.75rem; font-weight: 500; color: var(--accent-success); }

/* Chat Container */
.chat-container { 
    flex: 1; 
    max-width: 900px; 
    width: 100%; 
    margin: 0 auto; 
    display: flex; 
    flex-direction: column; 
    padding: 24px; 
}

/* Messages */
.messages { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    gap: 24px; 
    overflow-y: auto; 
    padding-bottom: 20px; 
}

.message { 
    display: flex; 
    gap: 16px; 
    animation: fadeIn 0.4s ease; 
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }

.message-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--border-color);
}

.message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.message.bot .message-avatar { 
    border-color: var(--accent-primary);
    box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
}
.message.user .message-avatar { 
    border-color: var(--text-muted);
}

.message-content { 
    max-width: 75%; 
    padding: 16px 20px; 
    border-radius: var(--radius-md); 
    line-height: 1.7; 
    font-size: 0.9375rem; 
}
.message.bot .message-content { 
    background: var(--bg-bot); 
    border: 1px solid var(--border-color);
    border-top-left-radius: 4px;
    color: var(--text-primary);
}
.message.user .message-content { 
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); 
    color: white; 
    border-top-right-radius: 4px;
}

.message-time { 
    font-size: 0.65rem; 
    color: var(--text-muted); 
    margin-top: 8px; 
    padding: 0 4px; 
}
.message.user .message-time { text-align: right; }

/* Typing Indicator */
.typing-indicator {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--bg-bot);
    border-radius: var(--radius-md);
    border-top-left-radius: 4px;
    max-width: 160px;
    border: 1px solid var(--border-color);
}

.typing-dots { display: flex; gap: 5px; }
.typing-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent-primary);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
.typing-text { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

/* Input Area - Glass Effect */
.input-area { 
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-color);
    padding: 20px 24px; 
    margin-top: auto;
}
.input-container { 
    max-width: 900px; 
    margin: 0 auto; 
    display: flex; 
    gap: 12px; 
    align-items: flex-end; 
}

.input-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg-secondary);
    border: 2px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 4px;
    transition: all 0.3s ease;
}

.input-wrapper:focus-within { 
    border-color: var(--accent-primary); 
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
}
.input-wrapper input { 
    flex: 1; 
    background: transparent; 
    border: none; 
    padding: 14px 18px; 
    font-size: 0.9375rem; 
    color: var(--text-primary); 
    outline: none; 
}
.input-wrapper input::placeholder { color: var(--text-muted); }

.send-btn {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}

.send-btn:hover:not(:disabled) { 
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
}
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.send-btn svg { width: 22px; height: 22px; fill: white; }

/* Quick Actions */
.quick-actions { 
    display: flex; 
    gap: 10px; 
    padding: 16px 0; 
    flex-wrap: wrap; 
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
}
.quick-btn {
    padding: 10px 18px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
}
.quick-btn:hover { 
    background: var(--accent-primary); 
    color: white; 
    border-color: var(--accent-primary);
    transform: translateY(-2px);
}

/* Scrollbar */
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
.messages::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Responsive */
@media (max-width: 640px) {
    .chat-container { padding: 16px; }
    .message-content { max-width: 85%; }
    .header { padding: 12px 16px; }
    .header-avatar { width: 40px; height: 40px; }
    .input-area { padding: 16px; }
    .quick-actions { padding: 12px 0; }
}

/* Code blocks in messages */
.message-content pre {
    background: var(--bg-primary);
    padding: 12px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 0.85rem;
}
.message-content code {
    font-family: 'Fira Code', 'Consolas', monospace;
    background: var(--bg-primary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85rem;
}
.message-content pre code {
    background: none;
    padding: 0;
}

/* Welcome message styling */
.welcome-message {
    text-align: center;
    padding: 40px 20px;
}
.welcome-message h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.welcome-message p {
    color: var(--text-secondary);
    font-size: 0.95rem;
}
</style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="header-avatar">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzJqc3h4eXhhNnRibXNmdm5tbjNkN3RibnVtb3o4Y3R0MnE3ZWt3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SA1uWeCL2K5As/source.gif" alt="AI Avatar">
        </div>
        <div class="header-info">
            <h1>Generalist AI</h1>
            <span>Ollama & OpenCode & LiteLLM</span>
        </div>
    </div>
    <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
    </div>
</header>

<div class="chat-container">
    <div class="messages" id="messages">
        <div class="message bot welcome-message">
            <h2>Selamat Datang! 👋</h2>
            <p>Saya Generalist AI, asisten virtual yang didukung oleh Ollama, OpenCode, dan LiteLLM Proxy.<br>Ada yang bisa saya bantu hari ini?</p>
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-btn" onclick="quickMessage('Apa kabar?')">🙋‍♂️ Apa kabar?</button>
        <button class="quick-btn" onclick="quickMessage('Jelaskan tentang AI')">🤖 Tentang AI</button>
        <button class="quick-btn" onclick="quickMessage('Bantu coding Python')">💻 Coding Python</button>
        <button class="quick-btn" onclick="quickMessage('Ceritakan lelucon')">😄 Lelucon</button>
    </div>
</div>

<div class="input-area">
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleEnter(event)">
        </div>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
// Get credentials from URL params or use default
const urlParams = new URLSearchParams(window.location.search);
const API_KEY = urlParams.get('api_key') || 'sk-oh-2VzusamgREQ2VOBcGpLtzTHHY52uVxGm';
const WORKSPACE_ID = urlParams.get('workspace') || '';

// Use work host API if available, otherwise use app.all-hands.dev
const getApiBase = () => {
    const host = window.location.hostname;
    // Map specific work hosts to their API endpoints
    if (host.includes('work-1') || host === 'work-1-adyduhrhebtxdywd.prod-runtime.all-hands.dev') {
        return 'https://work-1-adyduhrhebtxdywd.prod-runtime.all-hands.dev/api/v1';
    }
    if (host.includes('work-2') || host === 'work-2-adyduhrhebtxdywd.prod-runtime.all-hands.dev') {
        return 'https://work-2-adyduhrhebtxdywd.prod-runtime.all-hands.dev/api/v1';
    }
    // Default to app.all-hands.dev
    return 'https://app.all-hands.dev/api/v1';
};

const API_BASE = getApiBase();
let isProcessing = false;

// Identity instruction - Ollama, OpenCode & LiteLLM Proxy powered Generalist AI
const IDENTITY_PROMPT = "Your name is Generalist AI. You are an AI assistant powered by Ollama, OpenCode, and LiteLLM Proxy. Your model is minimax-m2.7:cloud. You are helpful, intelligent, and can assist with coding, analysis, research, and general tasks. Never mention OpenHands, LiteLLM, or any underlying framework. Always introduce yourself as Generalist AI.";

function quickMessage(msg) {
    document.getElementById('userInput').value = msg;
    sendMessage();
}

const handleEnter = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
};

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message || isProcessing) return;

    addMessage(message, 'user');
    input.value = '';
    showTyping();
    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;

    try {
        const convId = await createConversation(message);
        if (convId) {
            await pollForResponse(convId);
        } else {
            hideTyping();
            addMessage('Maaf, terjadi kesalahan koneksi. Silakan coba lagi. 🔄', 'bot');
        }
    } catch (e) {
        hideTyping();
        addMessage('Terjadi kesalahan: ' + e.message + ' ❌', 'bot');
    }

    isProcessing = false;
    document.getElementById('sendBtn').disabled = false;
}

async function createConversation(message) {
    const fullMessage = IDENTITY_PROMPT + "\n\nUser: " + message;
    
    try {
        const res = await fetch(API_BASE + '/app-conversations', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + API_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                initial_message: {
                    content: [{ type: "text", text: fullMessage }]
                }
            })
        });

        console.log('Create conversation response status:', res.status);

        if (!res.ok) {
            const errorText = await res.text();
            console.error('Create conversation error:', errorText);
            return null;
        }

        const data = await res.json();
        console.log('Create conversation response:', data);

        if (data.app_conversation_id) {
            return data.app_conversation_id;
        } else if (data.id) {
            console.log('Waiting for app_conversation_id, polling...');
            for (let i = 0; i < 30; i++) {
                await sleep(2000);
                const r = await fetch(API_BASE + '/app-conversations/start-tasks?ids=' + data.id, {
                    headers: { 'Authorization': 'Bearer ' + API_KEY }
                });
                if (r.ok) {
                    const tasks = await r.json();
                    console.log('Poll', i, 'tasks:', tasks);
                    const task = tasks[0];
                    if (task && task.status === 'READY' && task.app_conversation_id) {
                        return task.app_conversation_id;
                    }
                }
            }
        }
    } catch (e) {
        console.error('Create conversation exception:', e);
    }
    return null;
}

async function pollForResponse(convId) {
    let lastIndex = 0;
    let pollCount = 0;

    while (pollCount < 40) {
        try {
            const res = await fetch(API_BASE + '/conversation/' + convId + '/events/search?limit=50', {
                headers: {
                    'Authorization': 'Bearer ' + API_KEY,
                    'Accept': 'application/json'
                }
            });

            if (!res.ok) {
                await sleep(2000);
                pollCount++;
                continue;
            }

            const data = await res.json();
            const events = data.items || [];

            for (let i = lastIndex; i < events.length; i++) {
                const event = events[i];

                if (event.kind === 'MessageEvent' && (event.source === 'agent' || event.source === 'assistant')) {
                    const content = event.llm_message && event.llm_message.content;
                    if (content) {
                        let text = extractText(content);
                        if (text && text.trim()) {
                            text = cleanResponse(text);
                            hideTyping();
                            addMessage(text, 'bot');
                        }
                    }
                }

                if (event.kind === 'ObservationEvent') {
                    const obs = event.observation;
                    let content = '';
                    if (obs) {
                        if (obs.content) content = extractText(obs.content);
                        else if (obs.output) content = extractText(obs.output);
                    }
                    if (content && content.trim()) {
                        content = cleanResponse(content);
                        hideTyping();
                        addMessage(content, 'bot');
                    }
                }

                if (event.kind === 'ConversationStateUpdateEvent' &&
                    event.key === 'execution_status' && event.value === 'finished') {
                    return;
                }
            }

            lastIndex = events.length;

        } catch (e) {
            console.log('Poll error:', e);
        }

        pollCount++;
        await sleep(2000);
    }

    hideTyping();
    addMessage('Waktu respons habis. Coba lagi ya! ⏰', 'bot');
}

const extractText = (content) => {
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
        return content.map(c => c.text || c.content || '').join(' ').trim();
    }
    if (content && content.text) return content.text;
    return '';
};

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

const BOT_AVATAR_URL = 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzJqc3h4eXhhNnRibXNmdm5tbjNkN3RibnVtb3o4Y3R0MnE3ZWt3ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SA1uWeCL2K5As/source.gif';

function addMessage(content, type) {
    const container = document.getElementById('messages');
    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const avatarHtml = type === 'bot' 
        ? '<img src="' + BOT_AVATAR_URL + '" alt="AI Avatar">' 
        : '<img src="https://api.dicebear.com/7.x/bottts/svg?seed=user" alt="User Avatar">';
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerHTML = '<div class="message-avatar">' + avatarHtml + '</div><div><div class="message-content">' + escapeHtml(content) + '</div><div class="message-time">' + time + '</div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    hideTyping();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'message bot';
    div.innerHTML = '<div class="message-avatar"><img src="' + BOT_AVATAR_URL + '" alt="AI Avatar"></div><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><div class="typing-text">Mengetik...</div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

const hideTyping = () => {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
};

const escapeHtml = (text) => {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
};
</script>
</body>
</html>
